name: Update and Deploy

on:
  workflow_dispatch:
  schedule:
    # "every 2 hours"
    - cron: 0 */2 * * *
  push:
    branches:
      - main
  pull_request:
    types: [labeled, synchronize]
    branches:
      - main

jobs:
  deploy:
    name: Update and Deploy to Cloudflare
    runs-on: ubuntu-latest
    # Only run on PRs if they have the 'preview' label
    if: |
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'preview')
    permissions:
      contents: 'write'
      id-token: 'write'
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@v6

      # Restore cached plugin data to avoid re-fetching unchanged plugins
      - name: Restore plugin data cache
        uses: actions/cache@v4
        with:
          path: public/
          key: plugin-data-${{ github.run_id }}
          restore-keys: |
            plugin-data-

      # Uncomment if using bigquery for active version tracking
      # - id: auth
      #   name: Authenticate to Google Cloud
      #   uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
      #   with:
      #     credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      # reindex requires conda to be setup
      - uses: conda-incubator/setup-miniconda@fc2d68f6413eb2d87b895e92f8584b5b94a10167 # v3.3.0
        with:
          auto-activate-base: true
          activate-environment: ""

      # Install pipeline dependencies in conda environment
      # Use conda because we need it to query the anaconda API
      # 'conda' Python package is already available in base environment
      - name: Install dependencies
        run: |
          pip install -e .[pipeline]

      - name: Find packages by classifier
        run: |
          python -m npe2api.find_by_classifier
          # Alternative: use bigquery for active version tracking
          # python -m npe2api.bigquery

      # fetch new manifests for new/updated plugins
      - name: Fetch manifests
        run: |
          python -m npe2api.fetch_manifests

      # validate and re-index plugin versions
      # will update extended_summary.json, index.json and pypi.json
      # to include all plugin versions
      - name: (re)index
        run: |
          python -m npe2api.reindex
        env:
          GH_API_TOKEN: ${{ secrets.GH_API_TOKEN }}
          CODECOV_API_TOKEN: ${{ secrets.CODECOV_API_TOKEN }}

      # generate wrangler config and set bucket name for deployment
      - name: Generate deployment config
        id: deploy-config
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            PR_NUM=${{ github.event.pull_request.number }}
            echo "bucket_name=npe2api-pr-$PR_NUM" >> $GITHUB_OUTPUT
            python -m npe2api.wrangler_config --preview $PR_NUM
          else
            echo "bucket_name=npe2api" >> $GITHUB_OUTPUT
            python -m npe2api.wrangler_config --prod
          fi

      - name: Upload to R2
        run: |
          python -m npe2api.upload_to_r2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ steps.deploy-config.outputs.bucket_name }}

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
