name: Update and Deploy

on:
  workflow_dispatch:
    inputs:
      preview_name:
        description: 'Preview name (e.g., pr-123, test-feature)'
        required: true
        type: string
  schedule:
    # "every 2 hours"
    - cron: 0 */2 * * *
  push:
    branches:
      - main
  pull_request:
    types: [labeled, synchronize]
    branches:
      - main

jobs:
  deploy:
    name: Update and Deploy to Cloudflare
    runs-on: ubuntu-latest
    # Only run on PRs if they have the 'preview' label
    if: |
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'preview')
    environment:
      name: ${{ (github.event_name == 'push' || github.event_name == 'schedule') && 'Production' || 'Preview' }}
    permissions:
      contents: 'write'
      deployments: 'write'
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@v6

      # Restore cached plugin data to avoid re-fetching unchanged plugins
      - name: Restore plugin data cache
        uses: actions/cache@v4
        with:
          path: public/
          key: plugin-data-${{ github.run_id }}
          restore-keys: |
            plugin-data-

      # Uncomment if using bigquery for active version tracking
      # - id: auth
      #   name: Authenticate to Google Cloud
      #   uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
      #   with:
      #     credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      # we use conda because we need the `conda` package to query the anaconda API in reindex.py
      - uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate: true
          activate-environment: ""
          channels: conda-forge

      # pywrangler requires uv
      - name: Install uv
        uses: astral-sh/setup-uv@v7

      # pipeline: dependencies for finding and indexing plugins
      # dev: workers-py, which provides pywrangler for deployment
      - name: Install dependencies
        run: |
          pip install -e .[pipeline,dev]

      - name: Find packages by classifier
        run: |
          python -m npe2api.find_by_classifier
          # Alternative: use bigquery for active version tracking
          # python -m npe2api.bigquery

      # fetch new manifests for new/updated plugins
      - name: Fetch manifests
        run: |
          python -m npe2api.fetch_manifests

      # validate and re-index plugin versions
      # will update extended_summary.json, index.json and pypi.json
      # to include all plugin versions
      - name: (re)index
        run: |
          python -m npe2api.reindex
        env:
          GH_API_TOKEN: ${{ secrets.GH_API_TOKEN }}

      # generate wrangler config and set bucket name for deployment
      - name: Generate deployment config
        id: deploy-config
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            PREVIEW_NAME="pr-${{ github.event.pull_request.number }}"
            echo "bucket_name=npe2api-$PREVIEW_NAME" >> $GITHUB_OUTPUT
            python -m npe2api.wrangler_config --preview $PREVIEW_NAME
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            PREVIEW_NAME="${{ inputs.preview_name }}"
            echo "bucket_name=npe2api-$PREVIEW_NAME" >> $GITHUB_OUTPUT
            python -m npe2api.wrangler_config --preview $PREVIEW_NAME
          else
            echo "bucket_name=npe2api" >> $GITHUB_OUTPUT
            python -m npe2api.wrangler_config --prod
          fi

      - name: Upload to R2
        run: |
          python -m npe2api.upload_to_r2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ steps.deploy-config.outputs.bucket_name }}

      # Push public/ directory to separate data repository for history tracking
      # Uses shallow clone to fetch only latest commit, keeping operation fast
      - name: Push to data repository
        if: github.event_name == 'push' || github.event_name == 'schedule'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          DATA_REPO="npe2api-data"
          REMOTE_URL="https://x-access-token:${{ secrets.DATA_REPO_PAT }}@github.com/${{ github.repository_owner }}/${DATA_REPO}.git"

          # Shallow clone existing repo (only latest commit)
          git clone --depth 1 "$REMOTE_URL" data-repo
          cd data-repo

          # Remove old files and copy new ones
          git rm -rf . 2>/dev/null || true
          cp -r ../public/* .

          # Commit and push changes
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "Update plugin data from ${{ github.sha }}

          Triggered by: ${{ github.event_name }}
          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            git push origin main
            echo "Pushed changes to data repository"
          else
            echo "No changes to commit"
          fi

      # Deploy with pywrangler (supports pyproject.toml dependencies)
      - name: Create GitHub deployment
        uses: chrnorm/deployment-action@v2
        id: deployment
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: ${{ github.environment }}

      - name: Deploy Worker
        run: |
          pywrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Update deployment status (success)
        if: success()
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          state: success

      - name: Update deployment status (failure)
        if: failure()
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          state: failure
